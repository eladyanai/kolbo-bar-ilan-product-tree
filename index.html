<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>כלבו בר אילן - עץ קטגוריות</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #1f2937;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 95vh;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header-stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            font-size: 1.1em;
            opacity: 0.95;
        }

        .controls {
            display: flex;
            gap: 15px;
            padding: 20px;
            background: #f9fafb;
            border-bottom: 1px solid #e5e7eb;
            align-items: center;
            flex-wrap: wrap;
        }

        button, input {
            padding: 10px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 0.95em;
            cursor: pointer;
        }

        button {
            background: #667eea;
            color: white;
            border: none;
            font-weight: bold;
            transition: all 0.3s;
        }

        button:hover {
            background: #5568d3;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .search-box {
            flex: 1;
            min-width: 200px;
            background: white;
            color: #333;
        }

        .main-content {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .sidebar {
            width: 200px;
            background: #f9fafb;
            border-right: 1px solid #e5e7eb;
            overflow-y: auto;
            padding: 20px;
        }

        .sidebar-title {
            font-size: 0.9em;
            font-weight: bold;
            color: #6b7280;
            margin-bottom: 15px;
        }

        .content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .tree-row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: white;
            border: 1px solid #e5e7eb;
            margin: 5px 0;
            border-radius: 6px;
            cursor: move;
            transition: all 0.2s;
        }

        .tree-row:hover {
            background: #f3f4f6;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .tree-row.group {
            background: linear-gradient(135deg, #667eea15 0%, #764ba215 100%);
            border-left: 4px solid #667eea;
            font-weight: bold;
            padding-left: 20px;
        }

        .tree-row.department {
            padding-left: 40px;
            background: #f9fafb;
            border-left: 4px solid #764ba2;
            font-weight: 600;
        }

        .tree-row.subcategory {
            padding-left: 60px;
            background: white;
            border-left: 4px solid #667eea;
        }

        .drag-handle {
            font-size: 1.2em;
            color: #9ca3af;
            cursor: grab;
        }

        .item-name {
            flex: 1;
            font-size: 0.95em;
        }

        .item-count {
            background: #667eea;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.85em;
            font-weight: bold;
            min-width: 45px;
            text-align: center;
        }

        .item-id {
            color: #9ca3af;
            font-size: 0.85em;
            font-family: monospace;
        }

        .children {
            display: none;
        }

        .children.expanded {
            display: block;
        }

        .toggle-btn {
            width: 24px;
            height: 24px;
            background: none;
            border: none;
            cursor: pointer;
            padding: 0;
            color: #667eea;
            font-size: 1.2em;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #6b7280;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #e5e7eb;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            color: #ef4444;
            text-align: center;
            padding: 40px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📦 כלבו בר אילן - עץ קטגוריות</h1>
            <div class="header-stats">
                <span>📂 <strong id="groupCount">0</strong> קבוצות</span>
                <span>📁 <strong id="deptCount">0</strong> מחלקות</span>
                <span>📄 <strong id="subcatCount">0</strong> קטגוריות משנה</span>
            </div>
        </div>

        <div class="controls">
            <button onclick="expandAll()">📂 הרחב הכל</button>
            <button onclick="collapseAll()">📁 צמצם הכל</button>
            <input type="text" class="search-box" id="searchBox" placeholder="חיפוש...">
        </div>

        <div class="main-content">
            <div class="sidebar">
                <div class="sidebar-title">סנן לפי קבוצה</div>
                <div id="groupFilter"></div>
            </div>

            <div class="content" id="content">
                <div class="loading">
                    <div class="spinner"></div>
                    <p>טוען נתונים...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let allData = {};

        async function loadData() {
            try {
                const response = await fetch('/data.json');
                if (!response.ok) throw new Error('Failed to fetch data.json');
                allData = await response.json();
                renderTree();
                renderSidebar();
                updateStats();
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('content').innerHTML = '<div class="error">❌ שגיאה בטעינת הנתונים: ' + error.message + '</div>';
            }
        }

        function updateStats() {
            const groupCount = allData.groups?.length || 0;
            let deptCount = 0, subcatCount = 0;

            allData.groups?.forEach(g => {
                g.departments?.forEach(d => {
                    deptCount++;
                    subcatCount += d.subcategories?.length || 0;
                });
            });

            document.getElementById('groupCount').textContent = groupCount;
            document.getElementById('deptCount').textContent = deptCount;
            document.getElementById('subcatCount').textContent = subcatCount;
        }

        function renderSidebar() {
            const sidebar = document.getElementById('groupFilter');
            sidebar.innerHTML = '';
            allData.groups?.forEach(group => {
                const tag = document.createElement('button');
                tag.textContent = group.name;
                tag.style.width = '100%';
                tag.style.textAlign = 'right';
                tag.style.margin = '5px 0';
                tag.onclick = () => {
                    document.getElementById('searchBox').value = group.name;
                    renderTree();
                };
                sidebar.appendChild(tag);
            });
        }

        function renderTree() {
            const content = document.getElementById('content');
            const searchTerm = document.getElementById('searchBox').value.toLowerCase();

            if (!allData.groups || allData.groups.length === 0) {
                content.innerHTML = '<div class="error">אין נתונים זמינים</div>';
                return;
            }

            let html = '';

            allData.groups.forEach(group => {
                const groupMatches = !searchTerm || group.name.toLowerCase().includes(searchTerm);

                let groupHtml = `
                    <div style="margin: 10px 0;">
                        <div class="tree-row group">
                            <span class="drag-handle">☰</span>
                            <button class="toggle-btn" onclick="toggleGroup(event)">▼</button>
                            <span class="item-name">${group.name}</span>
                            <span class="item-count">${group.itemCount || 0}</span>
                        </div>
                        <div class="children expanded">
                `;

                group.departments?.forEach(dept => {
                    const deptMatches = !searchTerm || dept.name.toLowerCase().includes(searchTerm);

                    groupHtml += `
                        <div style="margin: 5px 0;">
                            <div class="tree-row department">
                                <span class="drag-handle">☰</span>
                                <button class="toggle-btn" onclick="toggleDept(event)">▼</button>
                                <span class="item-name">${dept.name}</span>
                                <span class="item-count">${dept.itemCount || 0}</span>
                            </div>
                            <div class="children expanded">
                    `;

                    dept.subcategories?.forEach(subcat => {
                        const subcatMatches = !searchTerm || 
                            subcat.name.toLowerCase().includes(searchTerm) || 
                            (subcat.commax_id && subcat.commax_id.toString().includes(searchTerm));

                        if (groupMatches || deptMatches || subcatMatches) {
                            groupHtml += `
                                <div class="tree-row subcategory">
                                    <span class="drag-handle">☰</span>
                                    <span class="item-name">${subcat.name}</span>
                                    <span class="item-id">#${subcat.commax_id}</span>
                                    <span class="item-count">${subcat.itemCount || 0}</span>
                                </div>
                            `;
                        }
                    });

                    groupHtml += `
                            </div>
                        </div>
                    `;
                });

                groupHtml += `
                        </div>
                    </div>
                `;

                html += groupHtml;
            });

            content.innerHTML = html || '<div class="error">לא נמצאו פריטים</div>';
        }

        function toggleGroup(event) {
            event.stopPropagation();
            const btn = event.target;
            const children = btn.closest('.tree-row').nextElementSibling;
            if (children?.classList.contains('children')) {
                children.classList.toggle('expanded');
                btn.textContent = children.classList.contains('expanded') ? '▼' : '▶';
            }
        }

        function toggleDept(event) {
            event.stopPropagation();
            const btn = event.target;
            const children = btn.closest('.tree-row').nextElementSibling;
            if (children?.classList.contains('children')) {
                children.classList.toggle('expanded');
                btn.textContent = children.classList.contains('expanded') ? '▼' : '▶';
            }
        }

        function expandAll() {
            document.querySelectorAll('.children').forEach(c => c.classList.add('expanded'));
            document.querySelectorAll('.toggle-btn').forEach(b => b.textContent = '▼');
        }

        function collapseAll() {
            document.querySelectorAll('.children').forEach(c => c.classList.remove('expanded'));
            document.querySelectorAll('.toggle-btn').forEach(b => b.textContent = '▶');
        }

        // Load on page load
        window.addEventListener('load', loadData);

        // Search on input
        document.addEventListener('DOMContentLoaded', () => {
            const searchBox = document.getElementById('searchBox');
            if (searchBox) {
                searchBox.addEventListener('input', () => renderTree());
            }
        });
    </script>
</body>
</html>
