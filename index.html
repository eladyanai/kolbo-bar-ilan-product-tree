<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>עץ הקטגוריות של כלבו בר אילן - Commax</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.8em;
            margin-bottom: 15px;
            font-weight: 700;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.95;
            margin-bottom: 20px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-top: 25px;
        }

        .stat {
            background: rgba(255,255,255,0.2);
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            backdrop-filter: blur(10px);
        }

        .stat-number {
            font-size: 2.5em;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 0.95em;
            opacity: 0.9;
        }

        .controls {
            display: flex;
            gap: 15px;
            padding: 20px;
            background: #f8f9fa;
            border-bottom: 1px solid #ddd;
            flex-wrap: wrap;
            align-items: center;
        }

        .search-box {
            flex: 1;
            min-width: 250px;
        }

        .search-box input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        .search-box input:focus {
            outline: none;
            border-color: #667eea;
        }

        .buttons {
            display: flex;
            gap: 10px;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            background: #667eea;
            color: white;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.3s;
        }

        button:hover {
            background: #764ba2;
        }

        button.secondary {
            background: #999;
        }

        .content {
            padding: 20px;
            max-height: calc(100vh - 300px);
            overflow-y: auto;
        }

        .category {
            margin-bottom: 15px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            background: #fafafa;
        }

        .category-header {
            display: flex;
            align-items: center;
            padding: 15px;
            cursor: pointer;
            background: white;
            border-bottom: 1px solid #e0e0e0;
            transition: background 0.2s;
        }

        .category-header:hover {
            background: #f5f5f5;
        }

        .toggle-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.2em;
            margin-right: 10px;
            transition: transform 0.3s;
            padding: 0;
            width: 25px;
            height: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .toggle-btn.open {
            transform: rotate(-90deg);
        }

        .category-title {
            font-weight: 600;
            font-size: 1.1em;
            flex: 1;
            margin-right: 10px;
        }

        .category-count {
            background: #667eea;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
        }

        .category-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
        }

        .category-content.visible {
            max-height: 2000px;
        }

        .subcategories {
            padding: 15px 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 12px;
            border-top: 1px solid #e0e0e0;
        }

        .subcategory {
            background: white;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #ddd;
            transition: all 0.2s;
        }

        .subcategory:hover {
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.1);
            border-color: #667eea;
        }

        .subcat-name {
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }

        .subcat-count {
            font-size: 0.85em;
            color: #666;
        }

        .footer {
            padding: 20px;
            background: #f5f5f5;
            border-top: 1px solid #ddd;
            text-align: center;
            color: #666;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌳 עץ הקטגוריות של כלבו בר אילן</h1>
            <p>Commax Catalog - עץ קטגוריות מלא ואינטראקטיבי</p>
            <div class="stats">
                <div class="stat">
                    <div class="stat-number" id="categoryCount">0</div>
                    <div class="stat-label">קטגוריות</div>
                </div>
                <div class="stat">
                    <div class="stat-number" id="subcategoryCount">0</div>
                    <div class="stat-label">תת-קטגוריות</div>
                </div>
                <div class="stat">
                    <div class="stat-number" id="productCount">0</div>
                    <div class="stat-label">מוצרים</div>
                </div>
            </div>
        </div>

        <div class="controls">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="🔍 חיפוש בקטגוריות...">
            </div>
            <div class="buttons">
                <button onclick="expandAll()">📂 הרחב הכל</button>
                <button onclick="collapseAll()" class="secondary">📁 סגור הכל</button>
            </div>
        </div>

        <div class="content" id="treeContainer">
        </div>

        <div class="footer">
            ✨ עץ קטגוריות אינטראקטיבי | Commax Catalog | עדכון אחרון: 2026-07-15
        </div>
    </div>

    <script>
        let allData = [];

        // Load data
        fetch('data.json')
            .then(response => response.json())
            .then(data => {
                allData = data.categories || [];
                console.log('📊 Loaded categories:', allData.length);
                renderTree();
                updateStats();
            })
            .catch(error => {
                console.error('Error loading data:', error);
                document.getElementById('treeContainer').innerHTML = 
                    '<div style="padding: 20px; color: red;">שגיאה בטעינת הנתונים</div>';
            });

        function updateStats() {
            let categoryCount = allData.length;
            let subcategoryCount = 0;
            let productCount = 0;

            allData.forEach(cat => {
                const subcategories = cat.subcategories || [];
                subcategoryCount += subcategories.length;
                
                subcategories.forEach(subcat => {
                    productCount += subcat.itemCount || 0;
                });
            });

            document.getElementById('categoryCount').textContent = categoryCount;
            document.getElementById('subcategoryCount').textContent = subcategoryCount;
            document.getElementById('productCount').textContent = productCount.toLocaleString('he-IL');
        }

        function renderTree() {
            const container = document.getElementById('treeContainer');
            container.innerHTML = '';

            allData.forEach(category => {
                container.appendChild(createCategoryElement(category));
            });
        }

        function createCategoryElement(category) {
            const div = document.createElement('div');
            div.className = 'category';

            const header = document.createElement('div');
            header.className = 'category-header';

            const toggle = document.createElement('button');
            toggle.className = 'toggle-btn open';
            toggle.innerHTML = '▶';
            toggle.onclick = (e) => {
                e.stopPropagation();
                content.classList.toggle('visible');
                toggle.classList.toggle('open');
            };

            const title = document.createElement('span');
            title.className = 'category-title';
            title.textContent = `${category.id}. ${category.name}`;

            const subcats = category.subcategories || [];
            const totalItems = subcats.reduce((sum, s) => sum + (s.itemCount || 0), 0);
            
            const badge = document.createElement('span');
            badge.className = 'category-count';
            badge.textContent = `${subcats.length} תת-קטגוריות • ${totalItems} מוצרים`;

            header.appendChild(toggle);
            header.appendChild(title);
            header.appendChild(badge);

            const content = document.createElement('div');
            content.className = 'category-content visible';

            const subcatsDiv = document.createElement('div');
            subcatsDiv.className = 'subcategories';

            if (subcats.length > 0) {
                subcats.forEach(subcat => {
                    const subcatDiv = document.createElement('div');
                    subcatDiv.className = 'subcategory';
                    subcatDiv.innerHTML = `
                        <div class="subcat-name">${subcat.id}. ${subcat.name}</div>
                        <div class="subcat-count">${(subcat.itemCount || 0).toLocaleString('he-IL')} מוצרים</div>
                    `;
                    subcatsDiv.appendChild(subcatDiv);
                });
            } else {
                subcatsDiv.innerHTML = '<div style="padding: 10px; color: #999;">אין תת-קטגוריות</div>';
            }

            content.appendChild(subcatsDiv);
            div.appendChild(header);
            div.appendChild(content);

            return div;
        }

        function expandAll() {
            document.querySelectorAll('.category-content').forEach(el => el.classList.add('visible'));
            document.querySelectorAll('.toggle-btn').forEach(el => el.classList.add('open'));
        }

        function collapseAll() {
            document.querySelectorAll('.category-content').forEach(el => el.classList.remove('visible'));
            document.querySelectorAll('.toggle-btn').forEach(el => el.classList.remove('open'));
        }

        // Search functionality
        document.getElementById('searchInput')?.addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            document.querySelectorAll('.category').forEach(cat => {
                const text = cat.textContent.toLowerCase();
                cat.style.display = text.includes(query) ? '' : 'none';
            });
        });
    </script>
</body>
</html>
